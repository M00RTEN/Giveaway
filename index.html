<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>M00RTEN Giveaway Debug</title>
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@1.1.6/dist/comfy.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background: #0e0e10; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { background: #18181b; padding: 30px; border-radius: 15px; border: 1px solid #9146ff; max-width: 500px; margin: auto; }
        #debug-log { background: #000; color: #0f0; padding: 10px; height: 150px; overflow-y: auto; text-align: left; font-size: 12px; margin-top: 20px; border: 1px solid #333; }
        .btn { background: #9146ff; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .user-list { background: #26262c; padding: 10px; margin-top: 10px; min-height: 50px; }
        #winner-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="box">
            <h1>Setup</h1>
            <button class="btn" onclick="login()">LOGG INN PÅ NYTT</button>
        </div>
    </div>

    <div id="app" style="display:none;" class="box">
        <h2 id="chan-name">Kanal</h2>
        <input type="text" id="cmd" value="!join" style="width:100%; padding:10px; box-sizing:border-box; margin-bottom:10px;">
        <div style="font-size: 3rem;" id="count">0</div>
        <div class="user-list" id="users">Ingen påmeldte</div>
        <button class="btn" onclick="draw()">TREKK VINNER</button>
    </div>

    <div class="box" style="margin-top: 20px; border-color: #444;">
        <p style="font-size: 10px;">HVA SKJER NÅ?</p>
        <div id="debug-log"></div>
    </div>

    <div id="winner-overlay" onclick="this.style.display='none'">
        <h1 style="font-size: 5rem;" id="winner-display">?</h1>
        <p>Trykk for å lukke</p>
    </div>

    <script>
        const CID = "amd8hpskhqo4pqchmhdvis0j7gbes7";
        const URI = window.location.origin + window.location.pathname; 
        
        const log = (msg) => {
            const d = document.getElementById('debug-log');
            d.innerHTML += `> ${msg}<br>`;
            d.scrollTop = d.scrollHeight;
        };

        const token = new URLSearchParams(window.location.hash.replace("#", "?")).get("access_token");

        if (token) {
            log("Token mottatt! Henter kanal-info...");
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';

            fetch('https://api.twitch.tv/helix/users', {
                headers: { 'Authorization': `Bearer ${token}`, 'Client-Id': CID }
            })
            .then(r => r.json())
            .then(data => {
                const user = data.data[0].login;
                document.getElementById('chan-name').innerText = user.toUpperCase();
                log("Logget inn som: " + user);
                startChat(user, token);
            })
            .catch(err => log("FEIL ved henting av bruker: " + err));
        } else {
            log("Venter på innlogging...");
        }

        function login() {
            log("Sender deg til Twitch...");
            // Vi bruker nøyaktig URI som er i nettleseren din nå
            window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${CID}&redirect_uri=${encodeURIComponent(URI)}&response_type=token&scope=chat:read+chat:edit`;
        }

        let participants = new Set();

        function startChat(channel, tok) {
            log("Prøver å koble til chatten på kanal: " + channel);
            
            ComfyJS.onChat = (user, msg) => {
                log(`Mottok melding fra ${user}: ${msg}`);
                const trigger = document.getElementById('cmd').value.trim().toLowerCase();
                if (msg.toLowerCase() === trigger) {
                    participants.add(user);
                    document.getElementById('count').innerText = participants.size;
                    document.getElementById('users').innerText = Array.from(participants).join(", ");
                    log(`SUKSESS: ${user} er med!`);
                }
            };

            ComfyJS.onConnected = () => {
                log("KOBLET TIL CHAT-SERVEREN! Siden er klar.");
            };

            ComfyJS.onError = (err) => log("CHAT FEIL: " + err);

            ComfyJS.Init(channel, tok);
        }

        function draw() {
            if(participants.size === 0) return alert("Ingen i listen");
            const arr = Array.from(participants);
            const winner = arr[Math.floor(Math.random() * arr.length)];
            
            document.getElementById('winner-display').innerText = winner;
            document.getElementById('winner-overlay').style.display = 'flex';
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    </script>
</body>
</html>
