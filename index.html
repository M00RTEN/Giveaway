<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameninjas RIGGED giveaways</title>
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@1.1.6/dist/comfy.min.js"></script>
    <style>
        :root {
            --twitch: #9146ff;
            --twitch-dark: #6441a5;
            --accent: #00f2ff;
            --bg: #0e0e10;
            --card: #18181b;
            --text: #efeff1;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--card);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            border: 1px solid #2d2d31;
            text-align: center;
            position: relative;
        }

        h1 { 
            font-size: 2rem; 
            margin-bottom: 1.5rem; 
            color: var(--twitch); 
            text-transform: uppercase; 
            letter-spacing: 3px;
            font-weight: 900;
        }

        /* Skjermhåndtering */
        #app { display: none; }

        /* Login-knapp */
        .btn-login {
            background: var(--twitch);
            color: white;
            padding: 18px 35px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .btn-login:hover { 
            background: var(--twitch-dark); 
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(145, 70, 255, 0.4);
        }

        /* Inputs og Kontroller */
        .control-group {
            text-align: left;
            margin-bottom: 25px;
        }
        label { display: block; font-size: 0.8rem; color: #adadb8; margin-bottom: 10px; text-transform: uppercase; font-weight: bold; }
        input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: white;
            padding: 15px;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1.1rem;
            outline: none;
        }
        input:focus { border-color: var(--twitch); }

        /* Statistikk */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 25px 0;
        }
        .stat-box {
            background: #26262c;
            padding: 20px;
            border-radius: 15px;
            border-bottom: 4px solid var(--twitch);
        }
        .count-val { font-size: 2.5rem; font-weight: 900; color: var(--accent); }

        /* Deltakerliste */
        .user-list {
            height: 250px;
            overflow-y: auto;
            background: #0a0a0c;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            text-align: left;
            margin-bottom: 25px;
        }
        .user-entry {
            padding: 10px;
            border-bottom: 1px solid #1f1f23;
            color: var(--accent);
            font-weight: bold;
            animation: arrive 0.4s ease forwards;
        }
        @keyframes arrive { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        /* Knapper */
        .btn-draw {
            width: 100%;
            background: linear-gradient(45deg, var(--twitch), #bd93f9);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-draw:hover { filter: brightness(1.2); transform: scale(1.02); }

        .btn-reset {
            background: transparent;
            color: #ff4d4d;
            border: none;
            margin-top: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Vinner Overlay */
        #winner-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .winner-card h1 { font-size: 5rem; color: var(--accent); text-shadow: 0 0 40px var(--accent); }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-screen">
            <h1>GIVEAWAY MASTER</h1>
            <p style="color: #adadb8; margin-bottom: 35px;">Trykk under for å koble til din Twitch-chat.</p>
            <button class="btn-login" onclick="startAuth()">LOGG INN MED TWITCH</button>
        </div>

        <div id="app">
            <h1 id="user-display">M00RTEN</h1>
            
            <div class="control-group">
                <label>Kommando i chat</label>
                <input type="text" id="cmd-input" value="!join">
            </div>

            <div class="stat-grid">
                <div class="stat-box">
                    <label>Deltakere</label>
                    <div id="count" class="count-val">0</div>
                </div>
                <div class="stat-box">
                    <label>Status</label>
                    <div id="status" style="color: #00ff88; font-weight: bold; margin-top: 10px;">LIVE</div>
                </div>
            </div>

            <label>Deltakerliste</label>
            <div id="list" class="user-list"></div>

            <button class="btn-draw" onclick="pickWinner()">TREKK VINNER!</button>
            <button class="btn-reset" onclick="resetList()">Nullstill alt</button>
        </div>
    </div>

    <div id="winner-overlay" onclick="this.style.display='none'">
        <div class="winner-card" style="text-align: center;">
            <h2 style="color: var(--twitch); letter-spacing: 8px; margin: 0;">VINNEREN ER:</h2>
            <h1 id="winner-name">?</h1>
            <p style="color: #666; font-weight: bold;">Trykk hvor som helst for å lukke</p>
        </div>
    </div>

    <script>
        const CLIENT_ID = "hgjkg95nbtdf895h49dax8vwkahydc"; 
        const REDIRECT_URI = "https://m00rten.github.io/Giveaway/"; 
        
        let participants = new Set();

        // Sjekker om vi har fått token fra Twitch
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const token = params.get("access_token");

        if (token) {
            initApp(token);
        }

        function startAuth() {
            const authUrl = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=chat:read&force_verify=true`;
            window.location.href = authUrl;
        }

        async function initApp(token) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';

            try {
                const response = await fetch('https://api.twitch.tv/helix/users', {
                    headers: { 'Authorization': `Bearer ${token}`, 'Client-Id': CLIENT_ID }
                });
                const data = await response.json();
                const username = data.data[0].login;
                document.getElementById('user-display').innerText = username.toUpperCase();
                
                startTwitchChat(username, token);
            } catch (err) {
                console.error("Feil ved innlogging:", err);
                alert("Innlogging utløpt. Prøv igjen.");
                window.location.href = REDIRECT_URI;
            }
        }

        function startTwitchChat(channel, token) {
            ComfyJS.onChat = (user, message, flags, self, extra) => {
                const trigger = document.getElementById('cmd-input').value.trim().toLowerCase();
                
                // Sjekker om meldingen matcher kommandoen (f.eks !join)
                if (message.toLowerCase() === trigger) {
                    if (!participants.has(user)) {
                        participants.add(user);
                        updateUI();
                        console.log("Ny deltaker:", user);
                    }
                }
            };

            ComfyJS.onConnected = () => {
                console.log("Koblet til chatten på:", channel);
                document.getElementById('status').innerText = "LIVE";
                document.getElementById('status').style.color = "#00ff88";
            };

            // Viktig: Bruker tokenet for å sikre stabil tilkobling
            ComfyJS.Init(channel, token);
        }

        function updateUI() {
            const listDiv = document.getElementById('list');
            const countDiv = document.getElementById('count');
            countDiv.innerText = participants.size;
            
            // Lager listen på nytt
            const userArray = Array.from(participants).reverse();
            listDiv.innerHTML = userArray.map(u => `<div class="user-entry">⭐ ${u}</div>`).join('');
        }

        function pickWinner() {
            if (participants.size === 0) return alert("Ingen deltakere i listen!");
            
            const arr = Array.from(participants);
            const winner = arr[Math.floor(Math.random() * arr.length)];
            
            document.getElementById('winner-name').innerText = winner;
            document.getElementById('winner-overlay').style.display = 'flex';
        }

        function resetList() {
            if (confirm("Er du sikker på at du vil tømme listen?")) {
                participants.clear();
                updateUI();
            }
        }
    </script>
</body>
</html>
